<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Compressible Turbulent Internal Flow Database</title>
  <style>
    body {
      font-family: Arial;
      margin: 30px;
    }

    input {
      padding: 10px;
      width: 300px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    li {
      padding: 6px 0;
    }
  </style>
</head>

<body>
  <h1>Compressible Turbulent Internal Flow Database</h1>

  <!-- 🔍 搜索框 -->
  <input type="text" id="searchBox" placeholder="Search name / major / id...">

  <ul id="list"></ul>

  <script>
    let allData = [];

    const list = document.getElementById("list");
    const searchBox = document.getElementById("searchBox");

    // 读取数据
    fetch("data.json")
      .then(res => res.json())
      .then(data => {
        allData = data;
        render(data);
      });

    // 渲染函数
    function render(data) {
      list.innerHTML = "";

      data.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.id} - ${item.name} - ${item.major}`;
        list.appendChild(li);
      });
    }

    // 🔍 搜索逻辑（实时过滤）
    searchBox.addEventListener("input", function () {
      const keyword = this.value.toLowerCase();

      const filtered = allData.filter(item => {
        return (
          String(item.id).includes(keyword) ||
          item.name.toLowerCase().includes(keyword) ||
          item.major.toLowerCase().includes(keyword)
        );
      });

      render(filtered);
    });
  </script>
</body>
</html>
